name: Mirror to public support site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          repository: nocentral/nocentral.github.io
          path: _destination
          token: ${{ secrets.MIRROR_TOKEN }}

      - name: Sync files
        run: |
          rsync -av \
            --delete \
            --exclude='.git' \
            --exclude='_destination' \
            --exclude='.github' \
            ./ _destination/

      - name: Commit and push if changed
        run: |
          cd _destination
          git config user.name "nocentral-mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to mirror"
          else
            git commit -m "Mirror from bradleyjim/nocentral-support@${GITHUB_SHA::7}"
            git push
          fi
